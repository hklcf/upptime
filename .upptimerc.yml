# Change these first
owner: hklcf # Your GitHub username
repo: upptime # Your GitHub repository name

# Add your sites here
sites:
  - name: eService-HK.com
    url: https://eservice-hk.com
  - name: eService-HK.net
    url: https://eservice-hk.net
  - name: Hosting 01
    url: $HOSTING_01
  - name: Hosting 02
    url: $HOSTING_02
  - name: Bot
    url: $BOT
  - name: Clients
    url: $CLIENTS
  - name: img.eservice-hk.net
    url: https://img.eservice-hk.net

status-website:
  # Add your custom domain below, or remove the next line if you don't have a domain
  cname: status.eservice-hk.com
  # Uncomment the following line if you don't have a custom domain and add your repo name
  # baseUrl: /upptime
  logoUrl: https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/icon.svg
  name: Upptime
  introTitle: "**Upptime** is the open-source uptime monitor and status page, powered entirely by GitHub."
  introMessage: This is a sample status page which uses **real-time** data from our [GitHub repository](https://github.com/upptime/upptime). No server required — just GitHub Actions, Issues, and Pages. [**Get your own for free**](https://github.com/upptime/upptime)
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO

# Upptime also supports notifications, assigning issues, and more
# See https://upptime.js.org/docs/configuration
